# DA ACCURACY TRACKER
# Tracks Devil's Advocate corrections vs actual outcomes
# Purpose: Measure whether DA corrections are accurate, excessive, or insufficient
#
# For each DA correction, record:
#   - Pre-DA Fair Value (what fundamental-analyst said)
#   - Post-DA Fair Value (after DA correction applied)
#   - DA correction % (how much DA changed FV)
#   - Current price at time of DA
#   - Price 6 months later (fill in when available)
#   - Actual outcome: Was DA right? (price moved toward post-DA FV or pre-DA FV?)
#
# Updated: 2026-02-18 | Framework v4.2
# Tools reading this: effectiveness_tracker.py (future integration)

version: "1.0"
last_updated: 2026-02-18

# METHODOLOGY:
# "DA was right" = price 6 months later is closer to post-DA FV than pre-DA FV
# "DA was excessive" = price 6 months later is between pre-DA and post-DA (DA overcorrected)
# "DA was insufficient" = price went BELOW post-DA FV (DA didn't correct enough)
# Review dates: check every month for entries >6 months old

