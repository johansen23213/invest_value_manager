        $1.4M, Director Blinn $259K. Pattern: broad-based, C-suite included.
        POSITIVE: SEC/DOJ cleared. AM Best A. S&P AA-. Data breach settled
        $4.66M (532K people). No 10b5-1 plans flagged on filings.
        ESCALATION REASONING: Last scan warned "if C-suite begins selling,
        ESCALATE." CEO sold Feb 17. Condition met. Also CMO sold Feb 12.
        Now 4 insiders (1 C-suite CEO + 1 C-suite CMO + 1 EVP + 1 Director).
      source: "investing.com, marketbeat.com, stocktitan.net, defenseworld.net"
      date_detected: 2026-02-13
      date_updated: 2026-02-19
      kill_condition_triggered: false
      kill_condition_at_risk: >
        KC#4 (new investigation opened): NOT triggered, but broad C-suite
        selling sometimes precedes material non-public information. SEC/DOJ
        are CLOSED, so this is more likely monetization than red flag.
        However, 4 insiders in 2 weeks is a PATTERN, not isolated events.
      recommendation: >
        HOLD but HEIGHTENED ALERT. The exercise-and-sell pattern is common
        post-earnings (options expiring, tax planning), and SEC/DOJ clearance
        removes the worst interpretation. However, the BREADTH is notable:
        CEO + CMO + EVP + Director = all C-suite layers selling within 13 days.
        IF any additional material insider sale occurs, or IF class action
        settlement terms are materially adverse, ESCALATE TO RED.
        No ADD at current levels. Maintain $125 ADD trigger only.
        Monitor: next Form 4 filings weekly.

