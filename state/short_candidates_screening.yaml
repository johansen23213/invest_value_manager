# =============================================================================
# SaaSpocalypse WATCH - Macro Theme for Short Candidates
# =============================================================================

saaspocalypse_watch:
  description: |
    The "Great Software De-rating" of 2026 is a macro theme driven by AI agent adoption
    (Claude Cowork, Salesforce Agentforce) destroying the per-seat SaaS pricing model.
    Enterprise software forward P/E collapsed from 39x to 21x in 4 months (largest
    compression since 2002 dot-com bust). $2T in market cap evaporated Jan-Feb 2026.

    KEY QUESTION: Is this overpriced or underpriced?
    - If SaaSpocalypse is STRUCTURAL: more downside in seat-based SaaS (WDAY, CRM, ADBE)
    - If SaaSpocalypse is SENTIMENT-driven: these are NOW value opportunities

    OUR PORTFOLIO EXPOSURE: ADBE, BYIT.L, EDEN.PA have SaaSpocalypse exposure.
    Standing orders: DSY.PA, PAYC, INTU also affected.
    This is a KEY STRATEGIC QUESTION that affects both long and short decisions.

  most_affected_companies:
    - "CRM (Salesforce) - task automation core to product"
    - "WDAY - per-employee pricing directly threatened"
    - "ADBE - creative AI could reduce seat needs"
    - "TEAM (Atlassian) - task tracking automatable"
    - "HUBS (HubSpot) - data entry/CRM automatable"
    - "PAYC (Paycom) - per-employee pricing"

  least_affected:
    - "NOW (ServiceNow) - workflow orchestration harder to replace"
    - "PANW (Palo Alto) - security not automatable"
    - "CDNS/SNPS (EDA tools) - irreplaceable engineering tools"

